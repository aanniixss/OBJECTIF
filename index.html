<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07070d;
      --surface: #0f0f1a;
      --surface2: #161625;
      --border: #1e1e30;
      --border2: #2a2a40;
      --accent: #e8410a;
      --accent2: #ff6b35;
      --text: #f0f0f8;
      --muted: #5a5a72;
      --muted2: #3a3a52;
      --danger: #ff3355;
      --gold: #f5a623;
      --radius: 14px;
      --radius-sm: 8px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(232,65,10,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .app { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; position: relative; z-index: 1; }

    /* HEADER */
    header {
      padding: 44px 0 28px;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
      border-bottom: 1px solid var(--border); margin-bottom: 32px;
    }
    .brand-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .brand-tag::before { content:''; width:18px; height:2px; background:var(--accent); }
    h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,8vw,68px); letter-spacing:2px; line-height:0.92; }
    h1 em { color:var(--accent); font-style:normal; }
    .hdr-date { text-align:right; }
    .hdr-date .day { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; line-height:1; }
    .hdr-date .full { font-size:12px; color:var(--muted); margin-top:2px; }

    /* NAV TABS */
    .nav-tabs {
      display:flex; gap:4px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:4px; margin-bottom:32px;
    }
    .nav-tab {
      flex:1; padding:11px 8px; background:none; border:none; cursor:pointer;
      color:var(--muted); font-family:'DM Sans',sans-serif;
      font-size:13px; font-weight:600; border-radius:10px;
      transition:all 0.2s; text-align:center; white-space:nowrap;
    }
    .nav-tab:hover { color:var(--text); }
    .nav-tab.active { background:var(--accent); color:#fff; }

    /* PAGES */
    .page { display:none; }
    .page.active { display:block; animation:fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* OBJ SUB-TABS */
    .obj-tabs { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
    .obj-tab {
      padding:8px 20px; border-radius:999px;
      border:1px solid var(--border2); background:none; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
      color:var(--muted); transition:all 0.2s;
    }
    .obj-tab:hover { border-color:var(--accent); color:var(--text); }
    .obj-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    .obj-panel { display:none; }
    .obj-panel.active { display:block; animation:fadeIn 0.2s ease; }

    .obj-panel-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
    }
    .obj-panel-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; }
    .obj-period-dates { font-size:12px; color:var(--muted); margin-top:3px; }

    .btn-add {
      display:flex; align-items:center; gap:7px;
      background:var(--accent); color:#fff; border:none;
      border-radius:var(--radius-sm); padding:9px 18px;
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-add:hover { transform:scale(1.04); background:var(--accent2); }
    .btn-add .plus { font-size:17px; line-height:1; }

    /* OBJ CARDS */
    .obj-list { display:flex; flex-direction:column; gap:10px; }
    .obj-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:18px 20px;
      display:flex; align-items:flex-start; gap:14px;
      transition:border-color 0.2s; animation:fadeIn 0.25s ease;
    }
    .obj-card:hover { border-color:var(--border2); }
    .obj-card.done { opacity:0.5; }
    .obj-card-check {
      width:22px; height:22px; border-radius:6px;
      border:2px solid var(--border2);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; cursor:pointer; margin-top:1px;
      transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .obj-card.done .obj-card-check { background:var(--accent); border-color:var(--accent); }
    .obj-card-check svg { opacity:0; transform:scale(0.4); transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .obj-card.done .obj-card-check svg { opacity:1; transform:scale(1); }
    .obj-card-body { flex:1; min-width:0; }
    .obj-card-text {
      font-size:15px; font-weight:500; color:var(--text);
      line-height:1.5; word-break:break-word;
    }
    .obj-card.done .obj-card-text { text-decoration:line-through; color:var(--muted); }
    .obj-card-meta { display:flex; align-items:center; gap:10px; margin-top:6px; flex-wrap:wrap; }
    .obj-card-date { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); font-weight:500; }
    .obj-badge {
      font-size:11px; font-weight:700; padding:2px 8px;
      border-radius:999px; letter-spacing:0.5px;
    }
    .obj-badge.urgent { background:rgba(255,51,85,0.12); color:var(--danger); }
    .obj-badge.soon   { background:rgba(245,166,35,0.12); color:var(--gold); }
    .obj-badge.ok     { background:rgba(232,65,10,0.1);   color:var(--accent2); }
    .obj-badge.done-tag { background:var(--muted2); color:var(--muted); }
    .obj-card-del {
      opacity:0; background:none; border:none; color:var(--muted); cursor:pointer;
      font-size:15px; padding:3px 7px; border-radius:4px; transition:all 0.2s; flex-shrink:0;
    }
    .obj-card:hover .obj-card-del { opacity:1; }
    .obj-card-del:hover { color:var(--danger); background:rgba(255,51,85,0.08); }
    .empty-state {
      text-align:center; padding:56px 20px;
      color:var(--muted); font-size:14px;
      border:1px dashed var(--border2); border-radius:var(--radius);
    }
    .empty-state .ei { font-size:34px; margin-bottom:12px; }
    .empty-state strong { display:block; color:var(--text); font-size:16px; margin-bottom:5px; }

    /* MODAL */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(7,7,13,0.85);
      z-index:100; display:flex; align-items:center; justify-content:center;
      padding:20px; opacity:0; pointer-events:none;
      transition:opacity 0.2s; backdrop-filter:blur(4px);
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:var(--surface2); border:1px solid var(--border2);
      border-radius:var(--radius); padding:28px;
      width:100%; max-width:440px;
      transform:translateY(16px) scale(0.97);
      transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.open .modal { transform:translateY(0) scale(1); }
    .modal-title {
      font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px;
      margin-bottom:20px;
    }
    .modal-title em { color:var(--accent); font-style:normal; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .form-input, .form-textarea {
      width:100%; background:var(--surface); border:1px solid var(--border2);
      border-radius:var(--radius-sm); padding:12px 14px;
      color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none;
      transition:border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus { border-color:var(--accent); }
    .form-input::placeholder, .form-textarea::placeholder { color:var(--muted); }
    .form-textarea { resize:none; min-height:80px; line-height:1.6; }
    .form-input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.4) sepia(1) saturate(3) hue-rotate(-20deg); cursor:pointer; }
    .modal-actions { display:flex; gap:10px; margin-top:22px; }
    .btn-save {
      flex:1; background:var(--accent); color:#fff; border:none;
      border-radius:var(--radius-sm); padding:13px;
      font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
      cursor:pointer; transition:all 0.18s;
    }
    .btn-save:hover { background:var(--accent2); }
    .btn-cancel {
      background:none; border:1px solid var(--border2); color:var(--muted);
      border-radius:var(--radius-sm); padding:13px 20px;
      font-family:'DM Sans',sans-serif; font-size:14px; cursor:pointer; transition:all 0.18s;
    }
    .btn-cancel:hover { border-color:var(--accent); color:var(--text); }

    /* ROUTINE */
    .progress-block { margin-bottom:24px; }
    .progress-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
    .progress-label { font-size:12px; color:var(--muted); font-weight:500; }
    .progress-count { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; }
    .progress-count em { color:var(--accent); font-style:normal; }
    .progress-track { height:3px; background:var(--border); border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:999px; transition:width 0.4s cubic-bezier(0.22,1,0.36,1); width:0%; }
    .all-done {
      display:none; background:linear-gradient(135deg,rgba(232,65,10,0.12),rgba(232,65,10,0.04));
      border:1px solid rgba(232,65,10,0.25); border-radius:var(--radius);
      padding:16px 20px; margin-bottom:20px;
      font-size:14px; font-weight:700; color:var(--accent2); text-align:center;
    }
    .all-done.show { display:block; }
    .habit-list { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .habit-row {
      display:flex; align-items:center; gap:14px;
      padding:17px 20px; border-bottom:1px solid var(--border);
      cursor:pointer; transition:background 0.15s; user-select:none;
      animation:fadeIn 0.25s ease;
    }
    .habit-row:last-child { border-bottom:none; }
    .habit-row:hover { background:var(--surface2); }
    .habit-row.done { background:rgba(232,65,10,0.03); }
    .habit-chk {
      width:22px; height:22px; border-radius:6px; border:2px solid var(--border2);
      flex-shrink:0; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .habit-row.done .habit-chk { background:var(--accent); border-color:var(--accent); }
    .habit-chk svg { opacity:0; transform:scale(0.4); transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .habit-row.done .habit-chk svg { opacity:1; transform:scale(1); }
    .habit-ico { font-size:20px; width:26px; text-align:center; flex-shrink:0; }
    .habit-label { flex:1; font-size:15px; font-weight:400; color:var(--text); transition:all 0.2s; }
    .habit-row.done .habit-label { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--accent); }
    .habit-del { opacity:0; background:none; border:none; color:var(--muted); font-size:15px; cursor:pointer; padding:4px 7px; border-radius:4px; transition:all 0.2s; }
    .habit-row:hover .habit-del { opacity:1; }
    .habit-del:hover { color:var(--danger); background:rgba(255,51,85,0.08); }
    .add-habit-block { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-top:16px; }
    .add-habit-block h3 { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; margin-bottom:14px; }
    .add-row { display:flex; gap:10px; flex-wrap:wrap; }
    .add-input {
      flex:1; min-width:180px; background:var(--surface2); border:1px solid var(--border2);
      border-radius:var(--radius-sm); padding:11px 14px;
      color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s;
    }
    .add-input:focus { border-color:var(--accent); }
    .add-input::placeholder { color:var(--muted); }
    .add-btn {
      background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm);
      padding:11px 22px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
      cursor:pointer; transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap;
    }
    .add-btn:hover { transform:scale(1.04); background:var(--accent2); }
    .reset-row { text-align:center; margin-top:40px; }
    .btn-reset {
      background:none; border:1px solid var(--border2); color:var(--muted);
      padding:9px 22px; border-radius:var(--radius-sm);
      font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
      letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .btn-reset:hover { border-color:var(--danger); color:var(--danger); }

    /* TOAST */
    .toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(70px);
      background:var(--accent); color:#fff; font-size:13px; font-weight:700;
      padding:11px 22px; border-radius:999px; z-index:999; opacity:0;
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
      white-space:nowrap; pointer-events:none;
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    @media(max-width:560px){
      header{padding:28px 0 20px;}
      .nav-tab{font-size:12px;padding:10px 5px;}
      .habit-row{padding:14px 14px;}
      .obj-card{padding:14px 14px;}
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="brand-tag">Système personnel</div>
      <h1>TABLEAU<br>DE <em>BORD</em></h1>
    </div>
    <div class="hdr-date">
      <div class="day" id="hdr-day"></div>
      <div class="full" id="hdr-date"></div>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="objectifs">🎯 Objectifs</button>
    <button class="nav-tab" data-tab="routine">⚡ Routine</button>
  </div>

  <!-- PAGE OBJECTIFS -->
  <div class="page active" id="page-objectifs">
    <div class="obj-tabs">
      <button class="obj-tab active" data-period="semaine">Semaine</button>
      <button class="obj-tab" data-period="mois">Mois</button>
      <button class="obj-tab" data-period="annee">Année</button>
    </div>

    <div class="obj-panel active" id="panel-semaine">
      <div class="obj-panel-header">
        <div>
          <div class="obj-panel-title">Objectifs de la semaine</div>
          <div class="obj-period-dates" id="dates-semaine"></div>
        </div>
        <button class="btn-add" onclick="openModal('semaine')"><span class="plus">+</span> Ajouter</button>
      </div>
      <div class="obj-list" id="list-semaine"></div>
    </div>

    <div class="obj-panel" id="panel-mois">
      <div class="obj-panel-header">
        <div>
          <div class="obj-panel-title">Objectifs du mois</div>
          <div class="obj-period-dates" id="dates-mois"></div>
        </div>
        <button class="btn-add" onclick="openModal('mois')"><span class="plus">+</span> Ajouter</button>
      </div>
      <div class="obj-list" id="list-mois"></div>
    </div>

    <div class="obj-panel" id="panel-annee">
      <div class="obj-panel-header">
        <div>
          <div class="obj-panel-title">Objectifs de l'année</div>
          <div class="obj-period-dates" id="dates-annee"></div>
        </div>
        <button class="btn-add" onclick="openModal('annee')"><span class="plus">+</span> Ajouter</button>
      </div>
      <div class="obj-list" id="list-annee"></div>
    </div>
  </div>

  <!-- PAGE ROUTINE -->
  <div class="page" id="page-routine">
    <div class="progress-block">
      <div class="progress-top">
        <span class="progress-label">Progression du jour</span>
        <span class="progress-count"><em id="prog-done">0</em> / <span id="prog-total">0</span></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    <div class="all-done" id="all-done">🔥 ROUTINE COMPLÈTE — Aucune excuse, aucun compromis. C'est ça le niveau.</div>
    <div class="habit-list" id="habit-list"></div>
    <div class="add-habit-block">
      <h3>+ Nouvelle habitude</h3>
      <div class="add-row">
        <input type="text" class="add-input" id="new-habit" placeholder="Ex : Méditer 10 min, Lire 20 pages…" maxlength="80" />
        <button class="add-btn" onclick="addHabit()">Ajouter</button>
      </div>
    </div>
    <div class="reset-row">
      <button class="btn-reset" onclick="resetDay()">↺ Réinitialiser la journée</button>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-title">Nouvel objectif — <em id="modal-period-lbl"></em></div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="modal-text" placeholder="Ex : Finir le module trading, Lancer mon projet…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Date limite</label>
      <input type="date" class="form-input" id="modal-date" />
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveObjective()">✓ Sauvegarder</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── UTILS ── */
const DAYS   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const fmt = d => `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
const fmtS = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
const isoD = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const escH = s => { const e=document.createElement('div'); e.appendChild(document.createTextNode(s)); return e.innerHTML; };

let toastTmr;
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ── HEADER DATE ── */
(()=>{
  const n=new Date();
  document.getElementById('hdr-day').textContent=DAYS[n.getDay()];
  document.getElementById('hdr-date').textContent=`${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
})();

/* ── NAV TABS ── */
document.querySelectorAll('.nav-tab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('page-'+b.dataset.tab).classList.add('active');
  });
});

/* ── OBJ SUB-TABS ── */
document.querySelectorAll('.obj-tab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.obj-tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.obj-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('panel-'+b.dataset.period).classList.add('active');
  });
});

/* ── PERIOD DATES ── */
(()=>{
  const n=new Date();
  const dow=n.getDay()===0?6:n.getDay()-1;
  const mon=new Date(n); mon.setDate(n.getDate()-dow);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  document.getElementById('dates-semaine').textContent=`Du ${fmt(mon)} au ${fmt(sun)}`;
  const ms=new Date(n.getFullYear(),n.getMonth(),1);
  const me=new Date(n.getFullYear(),n.getMonth()+1,0);
  document.getElementById('dates-mois').textContent=`Du ${fmt(ms)} au ${fmt(me)}`;
  const ys=new Date(n.getFullYear(),0,1);
  const ye=new Date(n.getFullYear(),11,31);
  document.getElementById('dates-annee').textContent=`Du ${fmt(ys)} au ${fmt(ye)}`;
})();

/* ── OBJECTIVES ── */
const OBJ_KEY='anis_obj_v3';
function loadObjs(){ try{return JSON.parse(localStorage.getItem(OBJ_KEY))||{semaine:[],mois:[],annee:[]}}catch{return{semaine:[],mois:[],annee:[]}} }
function saveObjs(){ localStorage.setItem(OBJ_KEY,JSON.stringify(objData)); }
let objData=loadObjs();

function daysLeft(iso){
  const n=new Date(); n.setHours(0,0,0,0);
  const d=isoD(iso); d.setHours(0,0,0,0);
  return Math.round((d-n)/86400000);
}

function badge(iso,done){
  if(done) return `<span class="obj-badge done-tag">✓ Terminé</span>`;
  const n=daysLeft(iso);
  if(n<0)  return `<span class="obj-badge urgent">En retard</span>`;
  if(n===0) return `<span class="obj-badge urgent">Aujourd'hui !</span>`;
  if(n<=3)  return `<span class="obj-badge urgent">${n}j restants</span>`;
  if(n<=7)  return `<span class="obj-badge soon">${n}j restants</span>`;
  return `<span class="obj-badge ok">${n}j restants</span>`;
}

function renderObjs(p){
  const list=document.getElementById('list-'+p);
  const items=objData[p];
  if(!items.length){
    list.innerHTML=`<div class="empty-state"><div class="ei">🎯</div><strong>Aucun objectif</strong>Appuie sur + pour en ajouter un</div>`;
    return;
  }
  list.innerHTML='';
  items.forEach((obj,i)=>{
    const card=document.createElement('div');
    card.className='obj-card'+(obj.done?' done':'');
    card.innerHTML=`
      <div class="obj-card-check" onclick="toggleObj('${p}',${i})">
        <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4.5L4 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="obj-card-body">
        <div class="obj-card-text">${escH(obj.text)}</div>
        <div class="obj-card-meta">
          ${obj.date?`<div class="obj-card-date">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 1v4M11 1v4M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            ${fmtS(isoD(obj.date))}
          </div>${badge(obj.date,obj.done)}`:''}
        </div>
      </div>
      <button class="obj-card-del" onclick="delObj('${p}',${i})">✕</button>
    `;
    list.appendChild(card);
  });
}

function renderAllObjs(){ ['semaine','mois','annee'].forEach(renderObjs); }
function toggleObj(p,i){ objData[p][i].done=!objData[p][i].done; saveObjs(); renderObjs(p); }
function delObj(p,i){ objData[p].splice(i,1); saveObjs(); renderObjs(p); toast('Objectif supprimé'); }

/* ── MODAL ── */
const PERIOD_LBL={semaine:'Semaine',mois:'Mois',annee:'Année'};
let curPeriod='semaine';

function openModal(p){
  curPeriod=p;
  document.getElementById('modal-period-lbl').textContent=PERIOD_LBL[p];
  document.getElementById('modal-text').value='';
  document.getElementById('modal-date').value='';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('modal-text').focus(),250);
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOut(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function saveObjective(){
  const text=document.getElementById('modal-text').value.trim();
  const date=document.getElementById('modal-date').value;
  if(!text){ document.getElementById('modal-text').focus(); return; }
  objData[curPeriod].push({text,date,done:false,id:Date.now()});
  saveObjs(); renderObjs(curPeriod); closeModal(); toast('Objectif ajouté ✓');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter'&&e.ctrlKey&&document.getElementById('modal-overlay').classList.contains('open')) saveObjective();
});

/* ── HABITS ── */
const H_KEY='anis_habits_v3', R_KEY='anis_reset_v2';
const DEF_HABITS=[
  {id:'h1',name:'Se doucher dès le réveil',emoji:'🚿',checked:false},
  {id:'h2',name:'100 pompes',emoji:'💪',checked:false},
  {id:'h3',name:'100 squats',emoji:'🦵',checked:false},
  {id:'h4',name:'100 abdos',emoji:'🔥',checked:false},
  {id:'h5',name:'100 barre fixe',emoji:'🏋️',checked:false},
  {id:'h6',name:'Posture (bonne posture)',emoji:'🧍',checked:false},
  {id:'h7',name:'Dormir tôt',emoji:'🌙',checked:false},
];
const DEF_IDS=new Set(['h1','h2','h3','h4','h5','h6','h7']);
const EMOJIS=['⚡','🎯','📚','🧠','🌟','🔑','💡','✊','🛡️','⚔️'];

function loadHabits(){ try{return JSON.parse(localStorage.getItem(H_KEY))||null}catch{return null} }
function saveHabits(){ localStorage.setItem(H_KEY,JSON.stringify(habits)); }
let habits=loadHabits()||JSON.parse(JSON.stringify(DEF_HABITS));

(()=>{
  const today=new Date().toDateString();
  if(localStorage.getItem(R_KEY)!==today){
    habits=habits.map(h=>({...h,checked:false}));
    saveHabits(); localStorage.setItem(R_KEY,today);
  }
})();

function renderHabits(){
  const list=document.getElementById('habit-list');
  list.innerHTML='';
  habits.forEach((h,i)=>{
    const row=document.createElement('div');
    row.className='habit-row'+(h.checked?' done':'');
    row.style.animationDelay=(i*20)+'ms';
    row.innerHTML=`
      <div class="habit-chk">
        <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4.5L4 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="habit-ico">${h.emoji}</span>
      <span class="habit-label">${escH(h.name)}</span>
      ${!DEF_IDS.has(h.id)?`<button class="habit-del" onclick="delHabit(event,${i})">✕</button>`:''}
    `;
    row.addEventListener('click',e=>{ if(e.target.classList.contains('habit-del')) return; toggleHabit(i); });
    list.appendChild(row);
  });
  updateProg();
}

function toggleHabit(i){ habits[i].checked=!habits[i].checked; saveHabits(); renderHabits(); }

function delHabit(e,i){
  e.stopPropagation();
  habits.splice(i,1); saveHabits(); renderHabits(); toast('Habitude supprimée');
}

function updateProg(){
  const total=habits.length, done=habits.filter(h=>h.checked).length;
  document.getElementById('prog-done').textContent=done;
  document.getElementById('prog-total').textContent=total;
  document.getElementById('prog-fill').style.width=(total?done/total*100:0)+'%';
  const b=document.getElementById('all-done');
  total>0&&done===total?b.classList.add('show'):b.classList.remove('show');
}

function addHabit(){
  const inp=document.getElementById('new-habit');
  const name=inp.value.trim(); if(!name){inp.focus();return;}
  habits.push({id:'h_'+Date.now(),name,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],checked:false});
  saveHabits(); renderHabits(); inp.value=''; inp.focus(); toast('Habitude ajoutée ✓');
}
document.getElementById('new-habit').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});

function resetDay(){
  if(!confirm('Réinitialiser toutes les cases ?')) return;
  habits=habits.map(h=>({...h,checked:false}));
  saveHabits(); renderHabits(); toast('Journée réinitialisée');
}

/* ── INIT ── */
renderAllObjs();
renderHabits();
</script>
</body>
</html>
